<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas VIP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0a; color: #ffffff; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .header-titulo { color: #f5c518; text-align: center; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-bottom: 10px; }
        .fecha-subtitulo { text-align: center; color: #888; margin-bottom: 30px; font-size: 1.1em;}
        
        /* Prominent visit counter card */
        .panel-visitas { background: linear-gradient(135deg, #111, #222); border-left: 5px solid #f5c518; padding: 25px; border-radius: 12px; margin-bottom: 30px; text-align: center; box-shadow: 0 4px 15px rgba(245, 197, 24, 0.1); }
        .visitas-numero { font-size: 4em; font-weight: 900; color: #f5c518; margin: 10px 0; }
        .visitas-texto { color: #aaa; font-size: 1.2em; text-transform: uppercase; letter-spacing: 1px;}
        
        .panel { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .panel h2 { color: #f5c518; margin-top: 0; font-size: 1.3em; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #f5c518; font-weight: bold; text-transform: uppercase; font-size: 0.9em; }
        tr:hover { background-color: #1a1a1a; }
        .badge-descargas { background: #f5c518; color: #000; padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9em;}
    </style>
</head>
<body>

<div class="container">
    <h1 class="header-titulo">📊 Reporte Diario</h1>
    <div class="fecha-subtitulo">Datos recopilados el: {{ fecha }}</div>

    <div class="panel-visitas">
        <div class="visitas-texto">👁️ DAILY PAGE VISITS</div>
        <div class="visitas-numero">{{ visitas }}</div>
    </div>

    <div class="panel">
        <h2>📥 Registro de Descargas por Archivo</h2>
        <table>
            <thead>
                <tr>
                    <th>Video / Archivo</th>
                    <th style="text-align: right;">Total Descargas</th>
                </tr>
            </thead>
            <tbody>
                {% for video in videos %}
                <tr>
                    <td>{{ video.titulo }}</td>
                    <td style="text-align: right;">
                        <span class="badge-descargas">{{ video.descargas }}</span>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2" style="text-align: center; color: #666; padding: 30px;">
                        No recorded downloads yet today.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
